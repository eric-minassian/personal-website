                </p>

                    <a class="border-solid border-2 border-black dark:border-white rounded-full mx-2 hover:border-white dark:hover:border-black hover:bg-black dark:hover:bg-white hover:text-white dark:hover:text-black"

<script type="text/javascript">
    const main_element = document.getElementById("body");
    const colorModeToggle = document.getElementById("colorModeToggle");
    const light_button = '<svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="1.5" stroke="currentColor" class="w-6 h-6"><path stroke-linecap="round" stroke-linejoin="round" d="M12 3v2.25m6.364.386l-1.591 1.591M21 12h-2.25m-.386 6.364l-1.591-1.591M12 18.75V21m-4.773-4.227l-1.591 1.591M5.25 12H3m4.227-4.773L5.636 5.636M15.75 12a3.75 3.75 0 11-7.5 0 3.75 3.75 0 017.5 0z" /></svg>';
    const dark_button = '<svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="1.5" stroke = "currentColor" class="w-6 h-6" ><path class="text-white" stroke-linecap="round" stroke-linejoin="round" d="M21.752 15.002A9.718 9.718 0 0118 15.75c-5.385 0-9.75-4.365-9.75-9.75 0-1.33.266-2.597.748-3.752A9.753 9.753 0 003 11.25C3 16.635 7.365 21 12.75 21a9.753 9.753 0 009.002-5.998z" /></svg > ';

    if (localStorage.theme === 'dark' || (!('theme' in localStorage) && window.matchMedia('(prefers-color-scheme: dark)').matches)) {
        main_element.classList.add('dark');
        colorModeToggle.innerHTML = dark_button;
    } else {
        colorModeToggle.innerHTML = light_button;
    }

    function setColorMode() {
        if (main_element.classList.contains("dark")) {
            main_element.classList.remove("dark");
            colorModeToggle.innerHTML = light_button;
            localStorage.theme = 'light'
        } else {
            main_element.classList.add("dark")
            colorModeToggle.innerHTML = dark_button;
            localStorage.theme = 'dark'
        }
    };
</script>
